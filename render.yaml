services:
  - type: web
    name: cuet-transport-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: cuet-transport-db
          property: connectionString
      - key: JWT_SECRET
        value: change-me-super-long-jwt-secret-for-cuet-transport-2026
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.onrender.com,https://cuet-transport-section.netlify.app,http://localhost:5173,http://localhost:3000
      - key: VERIFICATION_CODE_EXPIRY_MINUTES
        value: "10"
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: transportsectioncuet@gmail.com
      - key: MAIL_PASSWORD
        value: tncu yvbw qpod ascd

databases:
  - name: cuet-transport-db
    plan: free
    databaseName: cuet_transport
    user: cuet_transport_user
