spring.application.name=transport-backend
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

server.port=${PORT:8080}

# DATABASE_URL supports postgres:// or postgresql:// style URLs from providers like Neon.
app.database.url=${DATABASE_URL:}
app.database.username=${DATABASE_USERNAME:}
app.database.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false

spring.data.redis.repositories.enabled=false
spring.session.store-type=none

app.jwt.secret=${JWT_SECRET:change-me-to-a-very-long-random-secret-change-me-to-a-very-long-random-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://cuet-transport-section.netlify.app}
