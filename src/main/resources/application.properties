spring.application.name=transport-backend
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

server.port=${PORT:8080}

# DATABASE_URL supports postgres:// or postgresql:// style URLs from providers like Neon.
app.database.url=${DATABASE_URL:}
app.database.username=${DATABASE_USERNAME:}
app.database.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:3000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:600000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME_MS:30000}

server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

spring.flyway.enabled=false

spring.data.redis.repositories.enabled=false
spring.session.store-type=none

# Railway health checks /actuator/health. Disable Redis health when Redis is not configured.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=false

app.jwt.secret=${JWT_SECRET:change-me-to-a-very-long-random-secret-change-me-to-a-very-long-random-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://cuet-transport-section.netlify.app}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:transportsectioncuet@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tncu yvbw qpod ascd}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.verification.code-expiry-minutes=${VERIFICATION_CODE_EXPIRY_MINUTES:10}
