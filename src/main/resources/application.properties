spring.application.name=transport-backend
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

server.port=${PORT:8080}

# DATABASE_URL supports postgres:// or postgresql:// style URLs from providers like Neon.
app.database.url=${DATABASE_URL:}
app.database.username=${DATABASE_USERNAME:}
app.database.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false

spring.data.redis.repositories.enabled=false
spring.session.store-type=none

# Railway health checks /actuator/health. Disable Redis health when Redis is not configured.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=false

app.jwt.secret=${JWT_SECRET:change-me-to-a-very-long-random-secret-change-me-to-a-very-long-random-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://cuet-transport-section.netlify.app}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:transportsectioncuet@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tncu yvbw qpod ascd}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.verification.code-expiry-minutes=${VERIFICATION_CODE_EXPIRY_MINUTES:10}
